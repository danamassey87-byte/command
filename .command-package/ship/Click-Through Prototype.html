<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command · Click-Through · "I have an open house"</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --ink: #2a1f17;
  --ink-2: #3d2d1e;
  --muted: #6e665c;
  --faint: #8a807a;
  --line: #e8dfce;
  --paper: #fefdf9;
  --paper-2: #fdfbf5;
  --paper-3: #f5f1ea;
  --accent: #be7b56;
  --accent-dark: #9a5f3f;
  --sage: #7a9566;
  --rose: #b06a73;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Nunito Sans', sans-serif;
  font-size: 14px;
  color: var(--ink);
  background: var(--paper-3);
  overflow: hidden;
}

.serif { font-family: 'Cormorant Garamond', serif; letter-spacing: -0.3px; }
.mono  { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px; }

.app {
  height: 100vh;
  display: grid;
  grid-template-rows: 48px 1fr 44px;
}

/* ======= Chrome ======= */
.topbar {
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  padding: 0 18px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.topbar .brand { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 500; color: var(--ink); }
.topbar .proto-tag {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--accent);
  font-weight: 700;
  padding: 3px 8px;
  background: rgba(190, 123, 86, 0.1);
  border-radius: 2px;
}
.topbar .step-chips { display: flex; gap: 4px; flex: 1; justify-content: center; }
.topbar .step-chips .chip {
  font-size: 10px;
  padding: 4px 10px;
  color: var(--faint);
  border-radius: 12px;
  cursor: pointer;
  user-select: none;
  border: 1px solid transparent;
  white-space: nowrap;
}
.topbar .step-chips .chip.done { color: var(--sage); }
.topbar .step-chips .chip.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.topbar .step-chips .chip:hover:not(.active) { border-color: var(--line); }

.topbar .actions { display: flex; gap: 8px; }
.topbar .actions button {
  font-family: inherit;
  font-size: 12px;
  padding: 6px 12px;
  border: 1px solid var(--line);
  background: var(--paper);
  color: var(--ink);
  border-radius: 3px;
  cursor: pointer;
}
.topbar .actions button:hover { border-color: var(--ink); }
.topbar .actions button.primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* ======= Stage ======= */
.stage {
  overflow: auto;
  background: var(--paper-3);
  position: relative;
}
.stage-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* ======= Footer nav ======= */
.foot {
  background: var(--paper);
  border-top: 1px solid var(--line);
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.foot .progress {
  flex: 1;
  height: 3px;
  background: var(--line);
  border-radius: 2px;
  position: relative;
  margin: 0 20px;
  overflow: hidden;
}
.foot .progress-fill {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  background: var(--accent);
  transition: width 0.3s ease;
}
.foot .stepcount { font-size: 11px; color: var(--faint); white-space: nowrap; }
.foot button {
  font-family: inherit;
  font-size: 13px;
  padding: 7px 16px;
  border: 1px solid var(--line);
  background: var(--paper);
  color: var(--ink);
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.foot button.primary {
  background: var(--accent);
  color: var(--paper);
  border-color: var(--accent);
  font-weight: 600;
}
.foot button:disabled { opacity: 0.35; cursor: default; }
.foot button:not(:disabled):hover { border-color: var(--ink); }

/* ======= Screen frame styles ======= */
.screen {
  background: var(--paper);
  border-radius: 6px;
  border: 1px solid var(--line);
  box-shadow: 0 1px 3px rgba(42,31,23,0.03), 0 8px 30px rgba(42,31,23,0.06);
  overflow: hidden;
}

.screen-head {
  padding: 22px 30px 16px;
  border-bottom: 1px solid var(--line);
}
.screen-head .crumb {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  font-weight: 700;
}
.screen-head h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  line-height: 1;
  color: var(--ink);
  margin-top: 8px;
  font-weight: 500;
  letter-spacing: -0.8px;
}
.screen-head .sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  max-width: 580px;
  line-height: 1.5;
}

.screen-body { padding: 28px 30px 34px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 3px;
  border: 1px solid var(--line);
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
  text-decoration: none;
}
.btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }
.btn.accent  { background: var(--accent); color: var(--paper); border-color: var(--accent); font-weight: 600; }
.btn:hover { border-color: var(--ink); }

label { display: block; }
label .l {
  font-size: 10px;
  color: var(--faint);
  letter-spacing: 1.5px;
  font-weight: 600;
  margin-bottom: 6px;
  text-transform: uppercase;
}
input[type="text"], input[type="date"], input[type="time"], textarea, select {
  width: 100%;
  font-family: inherit;
  font-size: 14px;
  padding: 9px 12px;
  border: 1px solid var(--line);
  background: var(--paper-2);
  border-radius: 3px;
  color: var(--ink);
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); background: var(--paper); }

/* Grids */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

/* Cards */
.card {
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 16px;
  background: var(--paper-2);
}
.card.selectable { cursor: pointer; transition: all 0.15s; }
.card.selectable:hover { border-color: var(--accent); }
.card.selected {
  border: 2px solid var(--accent);
  background: var(--paper);
  padding: 15px;
}
.card .t { font-weight: 600; font-size: 14px; }
.card .s { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

/* Photo placeholder */
.photo-ph {
  background: linear-gradient(135deg, #e8dfce 0%, #d4c5a8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(42,31,23,0.3);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  border-radius: 3px;
}

/* "Generated" pills */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.pill.sage { background: rgba(122, 149, 102, 0.15); color: #5d6a52; }
.pill.accent { background: rgba(190, 123, 86, 0.15); color: var(--accent-dark); }
.pill.muted { background: var(--paper-3); color: var(--muted); }
.pill.rose { background: rgba(176, 106, 115, 0.12); color: #7a4048; }

/* Animations */
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.screen { animation: slideIn 0.25s ease both; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.generating {
  display: inline-block;
  animation: pulse 1.4s infinite;
  color: var(--accent);
  font-weight: 600;
}

.toast {
  position: fixed;
  top: 60px;
  right: 20px;
  background: var(--ink);
  color: var(--paper);
  padding: 10px 16px;
  border-radius: 4px;
  font-size: 13px;
  z-index: 100;
  animation: slideIn 0.2s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

hr.dash { border: none; border-top: 1px dashed var(--line); margin: 16px 0; }
.row { display: flex; align-items: center; gap: 12px; }
.sp { flex: 1; }

.help {
  font-size: 11px;
  color: var(--faint);
  margin-top: 6px;
  line-height: 1.4;
}

/* Welcome/intro style */
.welcome {
  text-align: center;
  padding: 60px 30px;
  max-width: 680px;
  margin: 0 auto;
}
.welcome h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  line-height: 1;
  letter-spacing: -1.2px;
  font-weight: 400;
}
.welcome .sub {
  font-size: 16px;
  color: var(--muted);
  margin-top: 16px;
  line-height: 1.6;
}

</style>
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="brand">Command</span>
    <span class="proto-tag">CLICK-THROUGH</span>
    <div class="step-chips" id="step-chips"></div>
    <div class="actions">
      <button onclick="restart()">↺ restart</button>
      <button onclick="jumpTo(0)">⌂ home</button>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <div class="stage-inner" id="stage-inner">
      <!-- injected -->
    </div>
  </div>

  <!-- FOOT -->
  <div class="foot">
    <button id="btn-back" onclick="prev()">← back</button>
    <div class="stepcount" id="stepcount">Step 0 of 0</div>
    <div class="progress"><div class="progress-fill" id="progress"></div></div>
    <div class="stepcount" id="scene-name"></div>
    <button class="primary" id="btn-next" onclick="next()">next →</button>
  </div>

</div>

<script>
// =========================================================================
// CLICK-THROUGH PROTOTYPE · "I have an open house"
// Linear 10-step journey. Each step is a self-contained screen.
// =========================================================================

const state = {
  stepIdx: 0,
  property: {
    address: '2222 Yellow Wood Lane',
    price: '$649,000',
    bed: 4, bath: 3, sf: '2,840',
    date: 'Saturday, April 26',
    time: '1:00 – 3:00 PM',
    highlights: ['Updated primary', 'Big backyard', 'Quiet street', 'Walk to Olive Park'],
  },
  photos: [
    { hero: true,  label: 'exterior · dusk' },
    { hero: false, label: 'primary bedroom' },
    { hero: false, label: 'kitchen' },
    { hero: false, label: 'backyard' },
    { hero: false, label: 'living · natural light' },
    { hero: false, label: 'dining nook' },
  ],
  content: {
    print: { flyers: true, doorhangers: true, signs: true, postcards: true },
    social: { ig: true, fb: true, tt: true, nd: true, ln: false, th: false },
    email: { farm: true, buyers: true, soi: true },
    budget: 0,
  },
};

const steps = [
  { name: 'Welcome',              render: stepWelcome },
  { name: 'Property basics',       render: stepBasics },
  { name: 'Upload photos',         render: stepPhotos },
  { name: 'Pick hero',             render: stepHero },
  { name: 'Choose outputs',        render: stepOutputs },
  { name: 'Generating',            render: stepGenerating },
  { name: 'Review print',          render: stepPrint },
  { name: 'Review social',         render: stepSocial },
  { name: 'Review email',          render: stepEmail },
  { name: 'Order & schedule',      render: stepOrder },
  { name: 'Done — week of',        render: stepDone },
  { name: 'More flows',            render: stepMoreFlows },
];

function stepMoreFlows() {
  const flows = [
    { num: '02', title: 'A PAC lead arrives from CertiLeads',
      summary: 'Intake → contact created → fee locked at 30% → auto-sequence → deal room shows projected referral · close gated on fee confirmation.',
      screens: 'Lead Sources · CRM · Sequences · Deal Room',
      tag: 'Lead attribution' },
    { num: '03', title: 'A cash-offer seller asks for an instant bid',
      summary: 'Home-value microsite intent → routed to FastCashOffers → 24h SLA timer → if declined, auto-enroll in traditional list sequence.',
      screens: 'Home Value · Lead Sources · CRM',
      tag: 'Cash offer' },
    { num: '04', title: 'Listing appointment prep',
      summary: 'CMA builder → neighborhood comps → presentation deck → compliance-checked handout → signed listing paperwork via Transact deep-link.',
      screens: 'Listing V5 · V6 · V7',
      tag: 'Listing' },
    { num: '05', title: 'Saturday open-house recon',
      summary: 'Pre-arrival brief (weather, traffic, comps) → QR kiosk sign-in → live visitor feed → post-OH enrollment into 14-day cadence.',
      screens: 'Open House V1-V9',
      tag: 'Existing' },
    { num: '06', title: 'Expired / FSBO prospecting',
      summary: 'Scraper surfaces expired listings → AI-personalized letter → call coach mid-dial → FSBO objection handling → 14-day cadence.',
      screens: 'Prospecting · Mobile',
      tag: 'Existing' },
    { num: '07', title: 'Under-contract coordination',
      summary: 'Transact doc checklist → counterparty tracker → inspection contingency expiring → Slack ping to Dana.',
      screens: 'Deals V1-V9',
      tag: 'Post-contract' },
    { num: '08', title: 'Client portal handoff (post-offer)',
      summary: 'Buyer gets portal invite → sees deal timeline, open tasks, vendor introductions, docs to sign → comments back to Dana.',
      screens: 'Client Portal (v2)',
      tag: 'New module' },
    { num: '09', title: 'Showing dispatch for a busy Saturday',
      summary: 'Multi-buyer day → route optimizer → showing confirmations → feedback collection → auto-updated CRM.',
      screens: 'Showing Dispatch (v2)',
      tag: 'New module' },
  ];

  return `
    <div style="max-width: 860px; margin: 0 auto;">
      <div style="text-align: center; margin-bottom: 40px;">
        <div class="mono" style="font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px;">END OF FLOW 01 · MORE TO EXPLORE</div>
        <h2 class="serif" style="font-size: 46px; line-height: 1.1; font-weight: 500; margin-bottom: 12px;">You've walked one scenario.</h2>
        <p class="serif" style="font-size: 22px; font-style: italic; color: var(--muted); max-width: 580px; margin: 0 auto;">These are the other scenarios the wireframes cover. Open <code class="mono" style="font-size:13px;">Command Wireframes.html</code> and jump to the labeled sections.</p>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        ${flows.map(f => `
          <div style="background: var(--paper-2); border: 1px solid var(--line); border-radius: 4px; padding: 22px 24px;">
            <div class="row" style="margin-bottom: 10px; align-items: baseline;">
              <span class="mono" style="font-size: 10px; color: var(--faint); letter-spacing: 2px;">FLOW ${f.num}</span>
              <div class="sp"></div>
              <span class="pill" style="font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; ${f.tag==='New module' ? 'background: rgba(190,123,86,0.12); color: var(--accent-dark);' : f.tag==='Existing' ? 'color: var(--sage);' : 'color: var(--muted);'}">${f.tag}</span>
            </div>
            <div class="serif" style="font-size: 22px; line-height: 1.25; margin-bottom: 10px; letter-spacing: -0.3px;">${f.title}</div>
            <div style="font-size: 13px; color: var(--ink-2); line-height: 1.6; margin-bottom: 12px;">${f.summary}</div>
            <div class="mono" style="font-size: 10px; color: var(--faint); letter-spacing: 1px; border-top: 1px dashed var(--line); padding-top: 10px;">→ ${f.screens}</div>
          </div>
        `).join('')}
      </div>
      <div style="text-align: center; margin-top: 36px; padding: 20px; border: 1px dashed var(--line); border-radius: 4px; color: var(--muted); font-size: 13px;">
        <span class="serif" style="font-style: italic; font-size: 16px;">Antigravity note</span> — this prototype walks <b>Flow 01</b> only. Treat the other 8 as must-read context in the wireframes before building.
      </div>
    </div>
  `;
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render() {
  const s = steps[state.stepIdx];
  const inner = document.getElementById('stage-inner');
  inner.innerHTML = s.render();
  // step chips
  const chips = steps.map((st, i) => {
    const cls = i === state.stepIdx ? 'active' : (i < state.stepIdx ? 'done' : '');
    return `<span class="chip ${cls}" onclick="jumpTo(${i})">${i + 1}. ${st.name}</span>`;
  }).join('');
  document.getElementById('step-chips').innerHTML = chips;
  document.getElementById('stepcount').textContent = `Step ${state.stepIdx + 1} of ${steps.length}`;
  document.getElementById('scene-name').textContent = s.name;
  document.getElementById('progress').style.width = `${(state.stepIdx / (steps.length - 1)) * 100}%`;
  document.getElementById('btn-back').disabled = state.stepIdx === 0;
  document.getElementById('btn-next').disabled = state.stepIdx === steps.length - 1;
  document.getElementById('btn-next').textContent = state.stepIdx === steps.length - 2 ? 'order & schedule →' : state.stepIdx === steps.length - 1 ? '✓ done' : 'next →';
  // scroll top
  document.getElementById('stage').scrollTop = 0;
}

function next() { if (state.stepIdx < steps.length - 1) { state.stepIdx++; render(); } }
function prev() { if (state.stepIdx > 0) { state.stepIdx--; render(); } }
function jumpTo(i) { state.stepIdx = i; render(); }
function restart() { state.stepIdx = 0; render(); }

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

// =========================================================================
// STEP 0 · WELCOME
// =========================================================================
function stepWelcome() {
  return `
    <div class="screen">
      <div class="welcome">
        <div style="font-size: 10px; letter-spacing: 3px; color: var(--accent); font-weight: 700;">A 90-SECOND WALKTHROUGH</div>
        <h1 style="margin-top: 14px;">I have an open house<br><em style="font-style: italic; color: var(--accent);">this Saturday.</em></h1>
        <p class="sub">
          This is the flow Dana runs on Monday to have everything — flyers, door hangers, yard signs, posts, emails, neighborhood cards, the QR kiosk — ready for Saturday.
          Ten screens, end to end.
        </p>

        <div class="grid-3" style="margin-top: 36px; text-align: left;">
          <div class="card">
            <div class="mono" style="font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 2px;">1–4</div>
            <div class="t" style="margin-top: 6px;">Setup</div>
            <div class="s">Property. Photos. Hero. Outputs.</div>
          </div>
          <div class="card">
            <div class="mono" style="font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 2px;">5–8</div>
            <div class="t" style="margin-top: 6px;">Generate + review</div>
            <div class="s">Print, social, email — all drafted, you approve.</div>
          </div>
          <div class="card">
            <div class="mono" style="font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 2px;">9–10</div>
            <div class="t" style="margin-top: 6px;">Ship</div>
            <div class="s">Order & schedule. Week-of view.</div>
          </div>
        </div>

        <div style="margin-top: 36px;">
          <button class="btn accent" onclick="next()" style="font-size: 14px; padding: 12px 22px;">start the walkthrough →</button>
        </div>

        <p class="help" style="margin-top: 20px;">Use the step chips above, or arrow keys, to jump around. Everything is interactive.</p>
      </div>
    </div>
  `;
}

// =========================================================================
// STEP 1 · PROPERTY BASICS
// =========================================================================
function stepBasics() {
  const p = state.property;
  return `
    <div class="screen">
      <div class="screen-head">
        <div class="crumb">STEP 1 · PROPERTY BASICS</div>
        <h1>What's the listing?</h1>
        <div class="sub">Address auto-fills from MLS. Everything below follows.</div>
      </div>
      <div class="screen-body">
        <div class="grid-2">
          <label>
            <span class="l">Address</span>
            <input type="text" value="${esc(p.address)}" oninput="state.property.address = this.value" />
            <div class="help">✓ matched MLS ID 2847103 · last updated 2h ago</div>
          </label>
          <label>
            <span class="l">List price</span>
            <input type="text" value="${esc(p.price)}" oninput="state.property.price = this.value" />
          </label>
        </div>

        <div class="grid-3" style="margin-top: 18px;">
          <label>
            <span class="l">Beds</span>
            <input type="text" value="${p.bed}" oninput="state.property.bed = this.value" />
          </label>
          <label>
            <span class="l">Baths</span>
            <input type="text" value="${p.bath}" oninput="state.property.bath = this.value" />
          </label>
          <label>
            <span class="l">Sq ft</span>
            <input type="text" value="${esc(p.sf)}" oninput="state.property.sf = this.value" />
          </label>
        </div>

        <hr class="dash" />

        <div class="grid-2">
          <label>
            <span class="l">Open house date</span>
            <input type="text" value="${esc(p.date)}" oninput="state.property.date = this.value" />
          </label>
          <label>
            <span class="l">Time window</span>
            <input type="text" value="${esc(p.time)}" oninput="state.property.time = this.value" />
          </label>
        </div>

        <hr class="dash" />

        <label>
          <span class="l">The story — 1 line</span>
          <input type="text" value="Quiet Olive Park block · updated primary · huge yard · walk to park" />
          <div class="help">Command uses this as the narrative backbone for captions, emails, flyer subhead. You can overwrite anywhere downstream.</div>
        </label>

        <div style="margin-top: 18px;">
          <span class="l" style="display: block; margin-bottom: 8px;">Highlights (pulled from MLS + your listing sheet)</span>
          <div style="display: flex; flex-wrap: wrap; gap: 6px;">
            ${p.highlights.map(h => `<span class="pill muted">${esc(h)}</span>`).join('')}

function runGenerating() {
  const log = document.getElementById('gen-log');

  const events = [

    { t: 450,  ic: '✂️', msg: 'creating 8 variants · 4×3, 16×9, 1:1, 9:16...' },

    { t: 2500, ic: '📝', msg: 'writing Nextdoor post · neighborhood tone...' },
    { t: 2900, ic: '📝', msg: 'writing FB Marketplace listing...' },
    { t: 3300, ic: '✉️', msg: 'drafting 3 emails · farm / buyers / sphere...' },
    { t: 3700, ic: '🎯', msg: 'scoring all captions with your voice tuner...' },
    { t: 4100, ic: '📅', msg: 'scheduling posts · Wed 6pm teaser · Fri 8am reveal · Sat 10am live...' },
    { t: 4500, ic: '📦', msg: 'prepping Vistaprint order · 3 SKUs...' },
    { t: 4900, ic: '🗺', msg: 'geocoding for Blotato + Nextdoor radius...' },
    { t: 5200, ic: '🔑', msg: 'generating kiosk QR · dana.bio/yellowwood-oh ...' },
    { t: 5500, ic: '✓',  msg: 'done. 23 drafts ready for review.', done: true },
  ];
  log.innerHTML = '';
  events.forEach(e => {
    setTimeout(() => {
      const line = document.createElement('div');
      line.innerHTML = `<span style="color: var(--accent); margin-right: 10px;">${e.ic}</span> ${e.msg}`;
      if (e.done) {
        line.style.color = 'var(--sage)';
        line.style.fontWeight = '600';
        line.style.paddingTop = '12px';
        line.style.marginTop = '12px';
        line.style.borderTop = '1px dashed var(--line)';
      }
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
      if (e.done) document.getElementById('btn-next').focus();
    }, e.t);
  });
}

function weekDay(day, badge, rows) {
  const [d, sub] = day.split(' · ');
  const isToday = badge === 'today';
  const isOH = badge === 'OH DAY';
  return `
    <div style="margin-bottom: 22px; padding: 18px 20px; border: 1px solid var(--line); border-left: 3px solid ${isOH ? 'var(--accent)' : isToday ? 'var(--sage)' : 'var(--line)'}; border-radius: 4px; background: var(--paper-2);">
      <div class="row" style="margin-bottom: 12px;">
        <span class="serif" style="font-size: 24px; letter-spacing: -0.3px;">${d}</span>
        <span class="mono" style="font-size: 10px; color: var(--faint); letter-spacing: 1.5px;">${sub}</span>
        ${badge ? `<span class="pill ${isOH ? 'accent' : 'sage'}" style="text-transform: uppercase; letter-spacing: 1.5px;">${badge}</span>` : ''}
        <div class="sp"></div>
        <span class="mono" style="font-size: 10px; color: var(--muted);">${rows.length} items</span>
      </div>
      ${rows.map(r => `
        <div class="row" style="padding: 8px 0; border-top: 1px dashed var(--line);">
          <span class="mono" style="font-size: 10px; color: var(--faint); font-weight: 700; letter-spacing: 1.5px; width: 78px;">${r[0]}</span>
          <div style="flex: 1;">
            <div style="font-weight: ${r[3] === 'needs-you' || r[3] === 'hot' ? 600 : 500}; font-size: 13px;">${r[1]}</div>
            <div style="font-size: 11px; color: var(--muted);">${r[2]}</div>
          </div>
          <span class="pill ${r[3] === 'done' ? 'sage' : r[3] === 'needs-you' ? 'rose' : r[3] === 'hot' ? 'accent' : 'muted'}">
            ${r[3] === 'done' ? '✓ done' : r[3] === 'needs-you' ? '✱ needs you' : r[3] === 'hot' ? '● live' : r[3] === 'confirmed' ? '✓ confirmed' : r[3] === 'scheduled' ? '⏰ scheduled' : '· waiting'}
          </span>
        </div>
      `).join('')}
    </div>
  `;
}

function kpiCard(num, label, sub) {
  return `
    <div class="card" style="text-align: center; padding: 18px;">
      <div class="serif" style="font-size: 34px; line-height: 1; color: var(--ink); letter-spacing: -0.5px;">${num}</div>
      <div style="font-size: 11px; color: var(--faint); margin-top: 6px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;">${label}</div>
      <div style="font-size: 11px; color: var(--muted); margin-top: 4px;">${sub}</div>
    </div>
  `;
}

// =========================================================================
// Keyboard nav
// =========================================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

// Persist step
window.addEventListener('beforeunload', () => localStorage.setItem('cmd-click-through-step', state.stepIdx));
try {
  const saved = parseInt(localStorage.getItem('cmd-click-through-step'), 10);
  if (!isNaN(saved) && saved >= 0 && saved < steps.length) state.stepIdx = saved;
} catch (e) {}

render();
</script>
